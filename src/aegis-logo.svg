<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- ── Gradients ─────────────────────────────────────────── -->
    <!-- Primary shield gradient — indigo to cyan vertical -->
    <linearGradient id="shieldGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="40%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Shield edge highlight -->
    <linearGradient id="shieldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Inner shield surface -->
    <linearGradient id="shieldInner" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0f1629" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0.98"/>
    </linearGradient>

    <!-- Core node gradient -->
    <radialGradient id="coreNode" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#c7d2fe"/>
      <stop offset="70%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>

    <!-- Layer gradients -->
    <linearGradient id="layerIndigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="layerCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="layerEmerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="50%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="layerAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>

    <!-- Ambient glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Vertical spine gradient -->
    <linearGradient id="spine" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Circuit trace gradient -->
    <linearGradient id="traceH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#22d3ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Shield crest glow -->
    <radialGradient id="crestGlow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Filters ───────────────────────────────────────────── -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <filter id="shieldShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#4f46e5" flood-opacity="0.25"/>
    </filter>

    <!-- ── Clip path for shield interior ─────────────────────── -->
    <clipPath id="shieldClip">
      <path d="M 300,88 L 440,148 C 456,156 466,172 466,190 L 466,320 C 466,390 430,452 376,488 L 312,530 C 304,535 296,535 288,530 L 224,488 C 170,452 134,390 134,320 L 134,190 C 134,172 144,156 160,148 Z"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 1 — Ambient background glow
       ═══════════════════════════════════════════════════════════ -->
  <circle cx="300" cy="310" r="260" fill="url(#ambientGlow)"/>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 2 — Shield form (AEGIS = shield)
       ═══════════════════════════════════════════════════════════ -->
  <g filter="url(#shieldShadow)">
    <!-- Shield outer edge / border -->
    <path d="M 300,80 L 446,143 C 464,152 476,170 476,190 L 476,324 C 476,398 438,464 381,502 L 314,546 C 305,552 295,552 286,546 L 219,502 C 162,464 124,398 124,324 L 124,190 C 124,170 136,152 154,143 Z"
          fill="url(#shieldEdge)" opacity="0.5"/>

    <!-- Shield main body -->
    <path d="M 300,88 L 440,148 C 456,156 466,172 466,190 L 466,320 C 466,390 430,452 376,488 L 312,530 C 304,535 296,535 288,530 L 224,488 C 170,452 134,390 134,320 L 134,190 C 134,172 144,156 160,148 Z"
          fill="url(#shieldInner)"/>

    <!-- Shield subtle border -->
    <path d="M 300,88 L 440,148 C 456,156 466,172 466,190 L 466,320 C 466,390 430,452 376,488 L 312,530 C 304,535 296,535 288,530 L 224,488 C 170,452 134,390 134,320 L 134,190 C 134,172 144,156 160,148 Z"
          fill="none" stroke="url(#shieldGrad)" stroke-width="1.8" opacity="0.45"/>

    <!-- Shield inner glow overlay -->
    <path d="M 300,88 L 440,148 C 456,156 466,172 466,190 L 466,320 C 466,390 430,452 376,488 L 312,530 C 304,535 296,535 288,530 L 224,488 C 170,452 134,390 134,320 L 134,190 C 134,172 144,156 160,148 Z"
          fill="url(#crestGlow)"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 3 — Platform layers (4 horizontal tiers inside shield)
       Represents: Foundation / Operations / Control / Intelligence
       ═══════════════════════════════════════════════════════════ -->
  <g clip-path="url(#shieldClip)">
    <!-- Horizontal platform layers — 4 domains -->

    <!-- Layer 4 — Intelligence (top, indigo) -->
    <line x1="185" y1="210" x2="415" y2="210" stroke="url(#layerIndigo)" stroke-width="1.5"/>
    <rect x="185" y="208" width="230" height="1" fill="url(#layerIndigo)" opacity="0.08"/>

    <!-- Layer 3 — Control (cyan) -->
    <line x1="165" y1="278" x2="435" y2="278" stroke="url(#layerCyan)" stroke-width="1.5"/>
    <rect x="165" y="276" width="270" height="1" fill="url(#layerCyan)" opacity="0.06"/>

    <!-- Layer 2 — Operations (emerald) -->
    <line x1="155" y1="346" x2="445" y2="346" stroke="url(#layerEmerald)" stroke-width="1.5"/>
    <rect x="155" y="344" width="290" height="1" fill="url(#layerEmerald)" opacity="0.05"/>

    <!-- Layer 1 — Foundation (amber) -->
    <line x1="170" y1="414" x2="430" y2="414" stroke="url(#layerAmber)" stroke-width="1.2"/>
    <rect x="170" y="412" width="260" height="1" fill="url(#layerAmber)" opacity="0.04"/>

    <!-- ═══════════════════════════════════════════════════════════
         LAYER 4 — Vertical spine (control plane backbone)
         ═══════════════════════════════════════════════════════════ -->
    <line x1="300" y1="145" x2="300" y2="490" stroke="url(#spine)" stroke-width="1.2"/>

    <!-- ═══════════════════════════════════════════════════════════
         LAYER 5 — Circuit traces (engineering / governance paths)
         ═══════════════════════════════════════════════════════════ -->
    <g opacity="0.4">
      <!-- Horizontal traces from spine to edges -->
      <!-- Intelligence tier traces -->
      <line x1="300" y1="210" x2="370" y2="210" stroke="#818cf8" stroke-width="0.8"/>
      <line x1="370" y1="210" x2="370" y2="230" stroke="#818cf8" stroke-width="0.8"/>
      <line x1="300" y1="210" x2="230" y2="210" stroke="#818cf8" stroke-width="0.8"/>
      <line x1="230" y1="210" x2="230" y2="230" stroke="#818cf8" stroke-width="0.8"/>

      <!-- Control tier traces -->
      <line x1="300" y1="278" x2="390" y2="278" stroke="#22d3ee" stroke-width="0.8"/>
      <line x1="390" y1="278" x2="390" y2="258" stroke="#22d3ee" stroke-width="0.8"/>
      <line x1="390" y1="278" x2="390" y2="298" stroke="#22d3ee" stroke-width="0.8"/>
      <line x1="300" y1="278" x2="210" y2="278" stroke="#22d3ee" stroke-width="0.8"/>
      <line x1="210" y1="278" x2="210" y2="258" stroke="#22d3ee" stroke-width="0.8"/>
      <line x1="210" y1="278" x2="210" y2="298" stroke="#22d3ee" stroke-width="0.8"/>

      <!-- Operations tier traces -->
      <line x1="300" y1="346" x2="380" y2="346" stroke="#34d399" stroke-width="0.8"/>
      <line x1="380" y1="346" x2="380" y2="366" stroke="#34d399" stroke-width="0.8"/>
      <line x1="300" y1="346" x2="220" y2="346" stroke="#34d399" stroke-width="0.8"/>
      <line x1="220" y1="346" x2="220" y2="366" stroke="#34d399" stroke-width="0.8"/>

      <!-- Foundation tier traces -->
      <line x1="300" y1="414" x2="350" y2="414" stroke="#fbbf24" stroke-width="0.6"/>
      <line x1="350" y1="414" x2="350" y2="430" stroke="#fbbf24" stroke-width="0.6"/>
      <line x1="300" y1="414" x2="250" y2="414" stroke="#fbbf24" stroke-width="0.6"/>
      <line x1="250" y1="414" x2="250" y2="430" stroke="#fbbf24" stroke-width="0.6"/>

      <!-- Diagonal governance paths -->
      <line x1="230" y1="230" x2="210" y2="258" stroke="#a78bfa" stroke-width="0.5"/>
      <line x1="370" y1="230" x2="390" y2="258" stroke="#a78bfa" stroke-width="0.5"/>
      <line x1="210" y1="298" x2="220" y2="346" stroke="#67e8f9" stroke-width="0.5"/>
      <line x1="390" y1="298" x2="380" y2="346" stroke="#67e8f9" stroke-width="0.5"/>
      <line x1="220" y1="366" x2="250" y2="414" stroke="#6ee7b7" stroke-width="0.5"/>
      <line x1="380" y1="366" x2="350" y2="414" stroke="#6ee7b7" stroke-width="0.5"/>
    </g>

    <!-- ═══════════════════════════════════════════════════════════
         LAYER 6 — Decision nodes (at intersections)
         ═══════════════════════════════════════════════════════════ -->
    <!-- Spine × layer intersection nodes -->
    <g filter="url(#nodeGlow)">
      <circle cx="300" cy="210" r="5" fill="#818cf8"/>
      <circle cx="300" cy="278" r="6" fill="#22d3ee"/>
      <circle cx="300" cy="346" r="5" fill="#34d399"/>
      <circle cx="300" cy="414" r="4" fill="#fbbf24"/>
    </g>
    <!-- Bright cores -->
    <circle cx="300" cy="210" r="2.5" fill="#c7d2fe"/>
    <circle cx="300" cy="278" r="3" fill="#a5f3fc"/>
    <circle cx="300" cy="346" r="2.5" fill="#a7f3d0"/>
    <circle cx="300" cy="414" r="2" fill="#fde68a"/>

    <!-- Circuit endpoint nodes (smaller) -->
    <g opacity="0.7">
      <!-- Intelligence tier -->
      <circle cx="230" cy="230" r="3" fill="#818cf8" filter="url(#nodeGlow)"/>
      <circle cx="370" cy="230" r="3" fill="#818cf8" filter="url(#nodeGlow)"/>
      <circle cx="230" cy="230" r="1.5" fill="#c7d2fe"/>
      <circle cx="370" cy="230" r="1.5" fill="#c7d2fe"/>

      <!-- Control tier -->
      <circle cx="210" cy="258" r="2.5" fill="#22d3ee" filter="url(#nodeGlow)"/>
      <circle cx="390" cy="258" r="2.5" fill="#22d3ee" filter="url(#nodeGlow)"/>
      <circle cx="210" cy="298" r="2.5" fill="#22d3ee" filter="url(#nodeGlow)"/>
      <circle cx="390" cy="298" r="2.5" fill="#22d3ee" filter="url(#nodeGlow)"/>
      <circle cx="210" cy="258" r="1.2" fill="#a5f3fc"/>
      <circle cx="390" cy="258" r="1.2" fill="#a5f3fc"/>
      <circle cx="210" cy="298" r="1.2" fill="#a5f3fc"/>
      <circle cx="390" cy="298" r="1.2" fill="#a5f3fc"/>

      <!-- Operations tier -->
      <circle cx="220" cy="346" r="3" fill="#34d399" filter="url(#nodeGlow)"/>
      <circle cx="380" cy="346" r="3" fill="#34d399" filter="url(#nodeGlow)"/>
      <circle cx="220" cy="366" r="2.5" fill="#34d399" filter="url(#nodeGlow)"/>
      <circle cx="380" cy="366" r="2.5" fill="#34d399" filter="url(#nodeGlow)"/>
      <circle cx="220" cy="346" r="1.5" fill="#a7f3d0"/>
      <circle cx="380" cy="346" r="1.5" fill="#a7f3d0"/>
      <circle cx="220" cy="366" r="1.2" fill="#a7f3d0"/>
      <circle cx="380" cy="366" r="1.2" fill="#a7f3d0"/>

      <!-- Foundation tier -->
      <circle cx="250" cy="414" r="2.5" fill="#fbbf24" filter="url(#nodeGlow)"/>
      <circle cx="350" cy="414" r="2.5" fill="#fbbf24" filter="url(#nodeGlow)"/>
      <circle cx="250" cy="430" r="2" fill="#fbbf24" filter="url(#nodeGlow)"/>
      <circle cx="350" cy="430" r="2" fill="#fbbf24" filter="url(#nodeGlow)"/>
      <circle cx="250" cy="414" r="1.2" fill="#fde68a"/>
      <circle cx="350" cy="414" r="1.2" fill="#fde68a"/>
      <circle cx="250" cy="430" r="1" fill="#fde68a"/>
      <circle cx="350" cy="430" r="1" fill="#fde68a"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 7 — Central control plane nexus (the "brain")
       ═══════════════════════════════════════════════════════════ -->

  <!-- Outer decision ring -->
  <circle cx="300" cy="278" r="42" fill="none" stroke="url(#shieldGrad)" stroke-width="1.2" opacity="0.3" filter="url(#softGlow)"/>

  <!-- Inner hexagonal decision pattern -->
  <g filter="url(#softGlow)" opacity="0.7">
    <polygon points="300,248 328,263 328,293 300,308 272,293 272,263"
             fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <polygon points="300,256 320,268 320,288 300,300 280,288 280,268"
             fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Central nexus core -->
  <circle cx="300" cy="278" r="14" fill="url(#coreNode)" opacity="0.9" filter="url(#strongGlow)"/>
  <circle cx="300" cy="278" r="9" fill="url(#coreNode)"/>
  <circle cx="300" cy="278" r="5" fill="#ffffff" opacity="0.95"/>
  <circle cx="297" cy="275" r="2" fill="#ffffff" opacity="0.7"/>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 8 — Shield crest accent (top chevron)
       ═══════════════════════════════════════════════════════════ -->
  <g opacity="0.5" filter="url(#softGlow)">
    <!-- Chevron at shield top — symbolizing upward governance -->
    <path d="M 270,140 L 300,120 L 330,140" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 280,152 L 300,138 L 320,152" fill="none" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 9 — Shield base accent (convergence point)
       ═══════════════════════════════════════════════════════════ -->
  <g opacity="0.4">
    <line x1="285" y1="490" x2="300" y2="510" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
    <line x1="315" y1="490" x2="300" y2="510" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
    <circle cx="300" cy="510" r="2.5" fill="#34d399" filter="url(#nodeGlow)"/>
    <circle cx="300" cy="510" r="1.2" fill="#a7f3d0"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 10 — Tier labels (subtle, inside shield)
       ═══════════════════════════════════════════════════════════ -->
  <g font-family="'Inter',system-ui,sans-serif" opacity="0.22">
    <text x="420" y="215" font-size="9" font-weight="700" fill="#818cf8" text-anchor="end" letter-spacing="0.08em">INTELLIGENCE</text>
    <text x="435" y="283" font-size="9" font-weight="700" fill="#22d3ee" text-anchor="end" letter-spacing="0.08em">CONTROL</text>
    <text x="440" y="351" font-size="9" font-weight="700" fill="#34d399" text-anchor="end" letter-spacing="0.08em">OPERATIONS</text>
    <text x="425" y="419" font-size="9" font-weight="700" fill="#fbbf24" text-anchor="end" letter-spacing="0.08em">FOUNDATION</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LAYER 11 — Outer sentinel particles
       ═══════════════════════════════════════════════════════════ -->
  <g opacity="0.3">
    <circle cx="108" cy="195" r="1.5" fill="#818cf8"/>
    <circle cx="492" cy="195" r="1.5" fill="#818cf8"/>
    <circle cx="95" cy="310" r="1.2" fill="#22d3ee"/>
    <circle cx="505" cy="310" r="1.2" fill="#22d3ee"/>
    <circle cx="115" cy="420" r="1" fill="#34d399"/>
    <circle cx="485" cy="420" r="1" fill="#34d399"/>
    <circle cx="220" cy="555" r="1" fill="#fbbf24"/>
    <circle cx="380" cy="555" r="1" fill="#fbbf24"/>
    <circle cx="190" cy="72" r="1" fill="#a5b4fc"/>
    <circle cx="410" cy="72" r="1" fill="#a5b4fc"/>
    <circle cx="300" cy="60" r="1.3" fill="#c7d2fe"/>
    <circle cx="140" cy="130" r="0.8" fill="#ddd6fe"/>
    <circle cx="460" cy="130" r="0.8" fill="#a5f3fc"/>
    <circle cx="80" cy="260" r="0.8" fill="#c7d2fe"/>
    <circle cx="520" cy="260" r="0.8" fill="#67e8f9"/>
    <circle cx="100" cy="370" r="0.8" fill="#6ee7b7"/>
    <circle cx="500" cy="370" r="0.8" fill="#6ee7b7"/>
    <circle cx="165" cy="500" r="0.8" fill="#a78bfa"/>
    <circle cx="435" cy="500" r="0.8" fill="#a78bfa"/>
  </g>
</svg>